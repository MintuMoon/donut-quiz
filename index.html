<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Which Donut Are You?</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Deferred modular scripts -->
    <script src="config.js" defer></script>
    <script src="questions.js" defer></script>
    <script src="storage.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="theme-candy">

    <!-- Interactive Canvas overlay for confetti particles -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Decorative background blobs -->
    <div class="bg-sphere sphere-1"></div>
    <div class="bg-sphere sphere-2"></div>

    <div class="quiz-container">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">
            <div class="donut-icon">🍩</div>
            <h1 id="start-title">Which Donut Are You?</h1>
            <p class="subtitle" id="start-subtitle">Discover your true sweet personality by answering random questions!</p>
            
            <!-- Personalization Dashboard -->
            <div class="personalization-box">
                <div class="input-group">
                    <label for="username-input" id="label-name">Enter Your Name:</label>
                    <input type="text" id="username-input" placeholder="Your name..." maxlength="20">
                </div>
                <div class="input-group">
                    <label for="lang-select" id="label-lang">Language / Язык:</label>
                    <select id="lang-select">
                        <option value="en">🇬🇧 English</option>
                        <option value="ru">🇷🇺 Русский</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="theme-select" id="label-theme">Choose Theme:</label>
                    <select id="theme-select">
                        <option value="candy">🍬 Sweet Candy</option>
                        <option value="matcha">🍵 Cozy Matcha</option>
                        <option value="cyber">⚡ Cyber Bacon</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="length-select" id="label-length">Quiz Length:</label>
                    <select id="length-select">
                        <option value="10">⚡ Short (10 Questions)</option>
                        <option value="20" selected>🍩 Standard (20 Questions)</option>
                        <option value="30">🏆 Marathon (30 Questions)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="sound-select" id="label-sound">Sound Effects:</label>
                    <select id="sound-select">
                        <option value="on">🔊 Enabled</option>
                        <option value="off">🔇 Disabled</option>
                    </select>
                </div>
            </div>

            <button class="btn" id="start-btn">Start Quiz</button>

            <!-- Dashboard Statistics -->
            <div class="dashboard-grid">
                <div id="history-box" class="dashboard-panel">
                    <h3 id="title-history">Recent Matches:</h3>
                    <ul id="history-list"></ul>
                </div>
                <div id="stats-box" class="dashboard-panel">
                    <h3 id="title-stats">Your Donut Stats:</h3>
                    <ul id="stats-list"></ul>
                </div>
            </div>
            
            <button id="clear-history-btn" class="clear-history-btn" style="display: none; margin: 20px auto 0 auto;">Clear Personal Data</button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="screen">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="question-number" class="question-number">Question 1 of 20</div>
            <div id="question-text" class="question-text">Loading question...</div>
            <div id="answers-list" class="answers-list"></div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="screen">
            <div class="donut-icon" id="result-emoji">🍩</div>
            <p class="result-label" id="result-user-greeting">Your Result</p>
            <div id="result-title" class="result-title">Classic Glazed</div>
            <div id="result-description" class="result-description">Loading description...</div>
            
            <div style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
                <button class="btn" id="restart-btn">Take Quiz Again</button>
                <button class="btn" id="share-btn" style="background: rgba(0,0,0,0.15); color: var(--text); box-shadow: none; font-size: 1rem; padding: 10px 25px;">Copy Result Link 📋</button>
            </div>
        </div>

    </div>

</body>
</html>
